_snippets_imports:
  hugo: false
paths:
  data: data
  collections: content
  layouts: layouts
  static: static
  uploads: static/uploads
  includes: layouts
  source: ''
  archetypes: archetypes
  assets: assets
  content: content
  pages: content
  publish: public
  config: ''
collection_groups:
  - heading: Collections
    collections:
      - pages
      - paintings
  - heading: Data
    collections:
      - exhibitions
collections_config:
  pages:
    path: content
    output: true
    filter: strict
    parse_branch_index: true
    icon: notes
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  paintings:
    schemas:
      default:
        path: .cloudcannon/schemas/paintings.md
    path: content/paintings
    output: true
    icon: notes
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  exhibitions:
    path: data
    text_key: year
_inputs:
  layout:
    type: text
    hidden: true
    cascade: true
  sale:
    type: switch
  price:
    hidden: '!sale'
  purchase_link:
    hidden: '!sale'
  draft:
    type: switch
  intro:
    type: textarea
data_config: {}
timezone: Etc/UTC
